<!DOCTYPE html>
<html lang="en">
<head>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <title>Flipkart</title>
  <style>
    * {
      box-sizing: border-box;
    }
    body {
      font-family: cursive;
    }

    .container {
      display: flex;
      align-items: center;
      padding: 10px 20px;
      background-color: #fff;
      margin-top: 20px;
    }

    .container > a {
      text-decoration: none;
      font-size: 20px;
      background-color: rgb(231, 227, 227);
      padding: 5px 20px;
      color: black;
      border-radius: 10px;
      margin: 0px 20px;
    }

    #flipkart {
      background-color: yellow;
    }

    #location {
      margin-left: 150px;
      background: none;
    }

    nav {
      display: flex;
      align-items: center;
      padding: 30px;
      background-color: #fff;
      margin-top: 20px;
    }

    nav > span {
      padding: 20px;
      border-radius: 10px;
      border: 2px solid blue;
      display: flex;
      align-items: center;
    }

    nav > span > input {
      width: 700px;
      height: 5px;
      padding: 12px 10px;
      font-size: 20px;
      font-family: cursive;
      border-radius: 20px;
      outline: none;
      border: none;
    }

    nav > span > input::placeholder {
      font-size: 20px;
      font-family: cursive;
      color: black;
    }

    nav > button {
      background: none;
      font-size: 20px;
      font-family: cursive;
      border: none;
      margin-left: 100px;
      cursor: pointer;
    }

    nav > a {
      font-family: cursive;
      text-decoration: none;
      font-size: 20px;
      color: black;
      margin: 0px 50px;
    }

    hr {
      margin-top: 10px;
    }
  </style>
</head>
<body>

  <div class="container">
    <a href="" id="flipkart">flipkart</a>
    <a href="">6a minutes</a>
    <a href="">Travels</a>
    <a href="">Grocery</a>
    <a href="" id="location"><i class="fa-solid fa-location-dot"></i> 560001 select delivery location</a>
  </div>

  <nav>
    <span>
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" name="" id="" placeholder="Search for Products, Brands and More">
    </span>
    <button><i class="fa-solid fa-circle-user"></i> Login</button>
    <a href="">Become a Seller</a>
    <a href=""><i class="fa-solid fa-cart-arrow-down"></i> Cart</a>
  </nav>

  <hr>

</body>
</html>
